name: Build and Publish Docker Image

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref (branch or tag) to build from'
        required: true
        default: 'master'
        type: string
      tags:
        description: 'Image tags (comma-separated, e.g. latest,v8.0.0)'
        required: true
        default: 'latest'
        type: string
  repository_dispatch:
    types: [build-image]

env:
  REGISTRY: ghcr.io
  SOURCE_REPO: dekaribbon/growi

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout source repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SOURCE_REPO }}
          ref: ${{ github.event.client_payload.ref || inputs.ref }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image tags and labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.SOURCE_REPO }}
          tags: |
            type=raw,value=${{ github.event.client_payload.tags || inputs.tags }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/app/docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
